<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Censo DIT</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    :root { --primary-color: #00796b; --secondary-color: #004d40; }
    body { background-color: #f0f4f4; color: #333; }
    .header-panel { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 25px; border-radius: 8px 8px 0 0; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .container { margin-top: 2%; max-width: 900px; }
    .card { border-radius: 12px; overflow: hidden; }
    .btn-save { background-color: var(--primary-color) !important; width: 100%; height: 50px; font-weight: bold; font-size: 1.1rem; }
    #loader { display: none; }
    .section-title { font-size: 0.9rem; font-weight: bold; color: var(--primary-color); text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; }
    input.validate.invalid { border-bottom: 1px solid #ff5252 !important; box-shadow: 0 1px 0 0 #ff5252 !important; }
  </style>
</head>
<body>

<div class="container">
  <div class="card z-depth-3">
    <div class="header-panel center-align">
      <h4 style="margin:0;"><i class="material-icons medium">assignment_ind</i> CENSO DIT</h4>
      <p style="margin: 5px 0 0;">Bienvenido</p>
    </div>
    
    <div class="card-content">
      <form id="pacienteForm">
        <div class="row">
          <div class="input-field col s12 m8">
            <i class="material-icons prefix">fingerprint</i>
            <input id="dni" type="text" class="validate" required pattern="[0-9]{8}" maxlength="8">
            <label for="dni">DNI (Obligatorio - 8 dígitos)</label>
          </div>
          <div class="col s12 m4">
            <button type="button" class="btn waves-effect blue darken-3" onclick="buscarDNI()" style="width:100%; margin-top:15px;">
              <i class="material-icons left">search</i> Verificar
            </button>
          </div>
        </div>

        <div class="section-title">Datos Personales</div>
        <div class="row">
          <div class="input-field col s12">
            <i class="material-icons prefix">person</i>
            <input id="nombreB" type="text" class="validate" required style="text-transform: uppercase;">
            <label for="nombreB">Apellidos y Nombres Completos (Obligatorio)</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m4">
            <i class="material-icons prefix">event</i>
            <input id="fn" type="text" placeholder="DD/MM/YYYY" maxlength="10" required class="validate">
            <label for="fn" class="active">Fecha de Nacimiento (Obligatorio)</label>
          </div>
          <div class="input-field col s12 m4">
            <select id="sexo" required>
              <option value="" disabled selected>Sexo</option>
              <option value="M">Masculino</option>
              <option value="F">Femenino</option>
            </select>
            <label>Sexo (Obligatorio)</label>
          </div>
          <div class="input-field col s12 m4">
            <select id="estado_civil">
              <option value="" disabled selected>Estado Civil</option>
              <option value="SOLTERO">Soltero/a</option>
              <option value="CONVIVIENTE">Conviviente</option>
              <option value="CASADO">Casado/a</option>
              <option value="VIUDO">Viudo/a</option>
              <option value="DIVORCIADO">Divorciado/a</option>
            </select>
            <label>Estado Civil (Opcional)</label>
          </div>
        </div>

        <div class="section-title">Ubicación y Contacto</div>
        <div class="row">
          <div class="input-field col s12 m8">
            <i class="material-icons prefix">map</i>
            <input list="listaSectores" id="sector" type="text" placeholder="Escriba para buscar sector..." required class="validate">
            <label for="sector" class="active">Sector (Obligatorio)</label>
            <datalist id="listaSectores">
              <option value="933-AA.VV. 25 DE ENERO"><option value="933-AA.VV. CARMEN GARAY">
              <option value="933-AA.VV. FUNDO NUEVA ESPERANZA"><option value="933-AA.VV. LOS LAURELES">
              <option value="933-AA.VV. PUEBLO LIBRE"><option value="933-AA.VV.01 DE MAYO">
              <option value="933-AA.VV.01 DE SETIEMBRE"><option value="933-AA.VV.07 DE MAYO">
              <option value="933-AA.VV.09 DE AGOSTO"><option value="933-AA.VV.15 DE AGOSTO">
              <option value="933-AA.VV.CESAR VALLEJO"><option value="933-AA.VV.CIUDAD COLINA">
              <option value="933-AA.VV.COLONIA TINGALESA"><option value="933-AA.VV.EDUARDO VILLASANTE">
              <option value="933-AA.VV.JOSE CARLOS MARIATEGUI"><option value="933-AA.VV.JOSE OLAYA BALANDRA">
              <option value="933-AA.VV.JUAN PICON QUEDO"><option value="933-AA.VV.JULIO MARTINEZ">
              <option value="933-AA.VV.LAS ALMENDRAS"><option value="933-AA.VV.LAS AMAZONAS">
              <option value="933-AA.VV.LAS PALMERAS"><option value="933-AA.VV.LOS ANGELES">
              <option value="933-AA.VV.LOS JARDINES"><option value="933-AA.VV.LOS PINOS">
              <option value="933-AA.VV.MARIA PARADO DE BELLIDO"><option value="933-AA.VV.MONTERRICO">
              <option value="933-AA.VV.NUEVA ESPERANZA"><option value="933-AA.VV.NUEVA JERUSALEN">
              <option value="933-AA.VV.NUEVO AMANECER"><option value="933-AA.VV.PADRES DE FAMILIA">
              <option value="933-AA.VV.PANTOJA"><option value="933-AA.VV.PEDREGAL">
              <option value="933-AA.VV.POBLADORES DE CASTILLO GRANDE"><option value="933-AA.VV.SAN CARLOS">
              <option value="933-AA.VV.SAN ISIDRO"><option value="933-AA.VV.SAN MIGUEL">
              <option value="933-AA.VV.SANTA ROSA"><option value="933-AA.VV.SOL NACIENTE">
              <option value="933-COMUNIDAD ASERRADERO"><option value="933-COMUNIDAD CAPITAN SOTO">
              <option value="933-COMUNIDAD HUANGANAPAMPA"><option value="933-COMUNIDAD HUAYNACAPAC">
              <option value="933-COMUNIDAD JACINTILLO"><option value="933-COMUNIDAD LA CURVA">
              <option value="933-COMUNIDAD LA FLORIDA"><option value="933-COMUNIDAD MANCO CAPAC">
              <option value="933-COMUNIDAD MANTARO"><option value="933-COMUNIDAD MERCED DE LOCRO">
              <option value="933-COMUNIDAD MOYANO"><option value="933-COMUNIDAD NUEVA ALTURA">
              <option value="933-COMUNIDAD PACHACUTEC"><option value="933-COMUNIDAD PAPAYAL">
              <option value="933-COMUNIDAD PICUROYACU"><option value="933-COMUNIDAD SANTA ROSA DE CASTILLA">
              <option value="933-COMUNIDAD SHAMIRO"><option value="933-COMUNIDAD SINCHI ROCCA">
              <option value="933-COMUNIDAD VENADO PAMPA"><option value="933-COMUNIDAD YURIMAGUAS">
              <option value="933-SIN SECTOR">
            </datalist>
          </div>
          <div class="input-field col s12 m4">
            <input id="mz" type="text">
            <label for="mz">Manzana (Opcional)</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m4">
            <i class="material-icons prefix">phone</i>
            <input id="telefono" type="text" pattern="[0-9]{9}" maxlength="9" required class="validate">
            <label for="telefono">Celular (9 dígitos - Obligatorio)</label>
          </div>
          <div class="input-field col s12 m8">
            <i class="material-icons prefix">place</i>
            <input id="ref_direccion" type="text" required class="validate">
            <label for="ref_direccion">Referencia de Dirección (Obligatorio)</label>
          </div>
        </div>

        <div class="section-title">Historial</div>
        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">folder</i>
            <input id="hclinica" type="text" required class="validate">
            <label for="hclinica">Historia Clínica (Obligatorio)</label>
          </div>
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">description</i>
            <input id="ffamiliar" type="text" maxlength="7" class="validate">
            <label for="ffamiliar">Ficha Familiar (Máx 7 números - Opcional)</label>
          </div>
        </div>

        <input type="hidden" id="rowNum" value="">

        <div class="center-align">
          <button id="btnSubmit" class="btn waves-effect btn-save" type="submit">
            <i class="material-icons right">cloud_upload</i> Guardar
          </button>
        </div>

        <div id="loader" class="center-align" style="margin-top:20px;">
          <div class="preloader-wrapper small active">
            <div class="spinner-layer spinner-green-only">
              <div class="circle-clipper left"><div class="circle"></div></div>
              <div class="gap-patch"><div class="circle"></div></div>
              <div class="circle-clipper right"><div class="circle"></div></div>
            </div>
          </div>
          <p>Procesando información...</p>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxndAilJNezsSb2LCOCprkA44edF3mEfKKs7R0TUhx3ceKzQzCAU0ae1vhpCghXyg2S/exec";

  document.addEventListener('DOMContentLoaded', function() {
    M.AutoInit();
    
    const fnInput = document.getElementById('fn');
    fnInput.addEventListener('input', function(e) {
      let v = e.target.value.replace(/\D/g, '').slice(0, 8);
      if (v.length >= 5) v = `${v.slice(0,2)}/${v.slice(2,4)}/${v.slice(4)}`;
      else if (v.length >= 3) v = `${v.slice(0,2)}/${v.slice(2)}`;
      e.target.value = v;
    });

    // Validación solo números para Manzana, Teléfono y Ficha Familiar
    ['mz', 'telefono', 'ffamiliar'].forEach(id => {
      document.getElementById(id).addEventListener('input', function(e) {
        this.value = this.value.replace(/[^0-9]/g, '');
      });
    });
  });

  async function buscarDNI() {
    const dni = document.getElementById('dni').value;
    if(dni.length < 8) return M.toast({html: 'DNI incompleto'});
    
    document.getElementById('loader').style.display = 'block';
    try {
      const response = await fetch(`${WEB_APP_URL}?action=buscar&dni=${dni}`);
      const data = await response.json();
      document.getElementById('loader').style.display = 'none';
      
      if(data) {
        document.getElementById('rowNum').value = data.row;
        document.getElementById('nombreB').value = data.nombreB;
        document.getElementById('fn').value = data.fn;
        document.getElementById('sexo').value = data.sexo;
        document.getElementById('hclinica').value = data.hclinica;
        document.getElementById('ffamiliar').value = data.ffamiliar;
        document.getElementById('telefono').value = data.telefono;
        document.getElementById('estado_civil').value = data.estado_civil;
        document.getElementById('sector').value = data.sector;
        document.getElementById('ref_direccion').value = data.ref_direccion;
        document.getElementById('mz').value = data.mz;
        
        M.updateTextFields();
        M.AutoInit(); 
        M.toast({html: '✅ Verificar Datos y actualizar'});
      } else {
        M.toast({html: 'ℹ️ Usuario Nuevo. Registre todos los datos.'});
        document.getElementById('rowNum').value = "";
      }
    } catch (error) {
      document.getElementById('loader').style.display = 'none';
      M.toast({html: '❌ Error de red'});
    }
  }

  document.getElementById('pacienteForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    if(!document.getElementById('sexo').value) {
        return M.toast({html: 'Seleccione el Sexo'});
    }

    document.getElementById('loader').style.display = 'block';
    document.getElementById('btnSubmit').disabled = true;

    const data = {
      row: document.getElementById('rowNum').value,
      dni: document.getElementById('dni').value,
      nombreB: document.getElementById('nombreB').value.toUpperCase(),
      fn: document.getElementById('fn').value,
      sexo: document.getElementById('sexo').value,
      hclinica: document.getElementById('hclinica').value,
      ffamiliar: document.getElementById('ffamiliar').value,
      telefono: document.getElementById('telefono').value,
      estado_civil: document.getElementById('estado_civil').value,
      sector: document.getElementById('sector').value,
      ref_direccion: document.getElementById('ref_direccion').value,
      mz: document.getElementById('mz').value
    };

    try {
      await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors',
        body: JSON.stringify(data)
      });

      document.getElementById('loader').style.display = 'none';
      document.getElementById('btnSubmit').disabled = false;
      M.toast({html: '🚀 Guardado con éxito'});
      this.reset();
      document.getElementById('rowNum').value = "";
      M.updateTextFields();
      M.AutoInit();
    } catch (error) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('btnSubmit').disabled = false;
      M.toast({html: '❌ Fallo al guardar'});
    }
  });
</script>
</body>
</html>
