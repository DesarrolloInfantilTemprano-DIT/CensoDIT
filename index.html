<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Censo DIT</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
  <style>
    :root { --primary-color: #00796b; --secondary-color: #004d40; }
    body { background-color: #f0f4f4; color: #333; }
    .header-panel { background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); color: white; padding: 25px; border-radius: 8px 8px 0 0; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    .container { margin-top: 2%; max-width: 900px; }
    .card { border-radius: 12px; overflow: hidden; }
    .btn-save { background-color: var(--primary-color) !important; width: 100%; height: 50px; font-weight: bold; font-size: 1.1rem; }
    .btn-search { margin-top: 15px; }
    #loader { display: none; }
    .input-field input:focus + label { color: var(--primary-color) !important; }
    .input-field input:focus { border-bottom: 1px solid var(--primary-color) !important; box-shadow: 0 1px 0 0 var(--primary-color) !important; }
    .section-title { font-size: 0.9rem; font-weight: bold; color: var(--primary-color); text-transform: uppercase; margin-bottom: 20px; border-bottom: 2px solid #e0e0e0; padding-bottom: 5px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card z-depth-3">
    <div class="header-panel center-align">
      <h4 style="margin:0;"><i class="material-icons medium">assignment_ind</i> DESARROLLO INFANTIL</h4>
      <p style="margin: 5px 0 0;">Censo DIT</p>
    </div>
    
    <div class="card-content">
      <form id="pacienteForm">
        <div class="row">
          <div class="input-field col s12 m8">
            <i class="material-icons prefix">fingerprint</i>
            <input id="dni" type="text" class="validate" required pattern="[0-9]{8}">
            <label for="dni">DNI (Escriba para buscar o registrar)</label>
          </div>
          <div class="col s12 m4">
            <button type="button" class="btn waves-effect waves-light blue darken-3 btn-search" onclick="buscarDNI()">
              <i class="material-icons left">search</i> Verificar DNI
            </button>
          </div>
        </div>

        <div class="section-title">Datos Personales (Se unirán en Columna B)</div>
        <div class="row">
          <div class="input-field col s12 m4">
            <input id="apePaterno" type="text" class="validate" required>
            <label for="apePaterno">Apellido Paterno</label>
          </div>
          <div class="input-field col s12 m4">
            <input id="apeMaterno" type="text" class="validate" required>
            <label for="apeMaterno">Apellido Materno</label>
          </div>
          <div class="input-field col s12 m4">
            <input id="nombres" type="text" class="validate" required>
            <label for="nombres">Nombres</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m4">
            <i class="material-icons prefix">event</i>
            <input id="fn" type="date" class="validate" required>
            <label for="fn" class="active">Fecha de Nacimiento</label>
          </div>
          <div class="input-field col s12 m4">
            <select id="sexo" required>
              <option value="" disabled selected>Seleccione Sexo</option>
              <option value="M">Masculino</option>
              <option value="F">Femenino</option>
            </select>
            <label>Sexo</label>
          </div>
          <div class="input-field col s12 m4">
            <select id="estado_civil">
              <option value="" disabled selected>Estado Civil</option>
              <option value="SOLTERO">Soltero/a</option>
                <option value="SOLTERO">Conviviente</option>
              <option value="CASADO">Casado/a</option>
              <option value="VIUDO">Viudo/a</option>
              <option value="DIVORCIADO">Divorciado/a</option>
            </select>
            <label>Estado Civil</label>
          </div>
        </div>

        <div class="section-title">Información Administrativa</div>
        <div class="row">
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">folder</i>
            <input id="hclinica" type="text">
            <label for="hclinica">Historia Clínica</label>
          </div>
          <div class="input-field col s12 m6">
            <i class="material-icons prefix">description</i>
            <input id="ffamiliar" type="text">
            <label for="ffamiliar">Ficha Familiar</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12 m4">
            <i class="material-icons prefix">phone</i>
            <input id="telefono" type="tel">
            <label for="telefono">Teléfono</label>
          </div>
          <div class="input-field col s12 m4">
            <input id="sector" type="text">
            <label for="sector">Sector</label>
          </div>
          <div class="input-field col s12 m4">
            <input id="mz" type="text">
            <label for="mz">Manzana (MZ)</label>
          </div>
        </div>

        <div class="row">
          <div class="input-field col s12">
            <i class="material-icons prefix">place</i>
            <input id="ref_direccion" type="text">
            <label for="ref_direccion">Referencia de Dirección</label>
          </div>
        </div>

        <input type="hidden" id="rowNum" value="">

        <div class="center-align">
          <button id="btnSubmit" class="btn waves-effect waves-light btn-save" type="submit">
            <i class="material-icons right">cloud_upload</i> Guardar Datos
          </button>
        </div>

        <div id="loader" class="center-align" style="margin-top:20px;">
          <div class="preloader-wrapper small active">
            <div class="spinner-layer spinner-green-only">
              <div class="circle-clipper left"><div class="circle"></div></div>
              <div class="gap-patch"><div class="circle"></div></div>
              <div class="circle-clipper right"><div class="circle"></div></div>
            </div>
          </div>
          <p>Procesando información...</p>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
<script>
  // PEGA AQUÍ TU URL DE GOOGLE APPS SCRIPT (LA QUE TERMINA EN /exec)
  const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwcMJhghf8hJVk1GbqvwvZjuf3Eic1FFuZgkI_Oik9l-YdQNPwabGjoFt0QM2sUS6WlrQ/exec";

  document.addEventListener('DOMContentLoaded', function() {
    M.AutoInit();
  });

  async function buscarDNI() {
    const dni = document.getElementById('dni').value;
    if(dni.length < 8) {
      M.toast({html: 'Ingrese un DNI válido (8 dígitos)'});
      return;
    }
    
    document.getElementById('loader').style.display = 'block';
    
    try {
      // Llamada al doGet del Script con parámetro action=buscar
      const response = await fetch(`${WEB_APP_URL}?action=buscar&dni=${dni}`);
      const data = await response.json();
      
      document.getElementById('loader').style.display = 'none';
      
      if(data) {
        document.getElementById('rowNum').value = data.row;
        // El nombre viene unido desde Columna B del Excel
        document.getElementById('nombres').value = data.nombreCompleto;
        document.getElementById('apePaterno').value = ""; 
        document.getElementById('apeMaterno').value = "";
        
        document.getElementById('fn').value = data.fn;
        document.getElementById('sexo').value = data.sexo;
        document.getElementById('hclinica').value = data.hclinica;
        document.getElementById('ffamiliar').value = data.ffamiliar;
        document.getElementById('telefono').value = data.telefono;
        document.getElementById('estado_civil').value = data.estado_civil;
        document.getElementById('sector').value = data.sector;
        document.getElementById('ref_direccion').value = data.ref_direccion;
        document.getElementById('mz').value = data.mz;
        
        M.updateTextFields();
        M.AutoInit(); 
        M.toast({html: '✅ Registro encontrado'});
      } else {
        M.toast({html: 'ℹ️ DNI no encontrado. Listo para nuevo registro.'});
        document.getElementById('rowNum').value = "";
        document.getElementById('nombres').value = "";
      }
    } catch (error) {
      document.getElementById('loader').style.display = 'none';
      M.toast({html: '❌ Error al conectar con el servidor'});
    }
  }

  document.getElementById('pacienteForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    document.getElementById('loader').style.display = 'block';
    document.getElementById('btnSubmit').disabled = true;

    const nom = document.getElementById('nombres').value;
    const pat = document.getElementById('apePaterno').value;
    const mat = document.getElementById('apeMaterno').value;
    const nombreUnido = `${pat} ${mat} ${nom}`.trim();

    const data = {
      row: document.getElementById('rowNum').value,
      dni: document.getElementById('dni').value,
      nombreB: nombreUnido,
      fn: document.getElementById('fn').value,
      sexo: document.getElementById('sexo').value,
      hclinica: document.getElementById('hclinica').value,
      ffamiliar: document.getElementById('ffamiliar').value,
      telefono: document.getElementById('telefono').value,
      estado_civil: document.getElementById('estado_civil').value,
      sector: document.getElementById('sector').value,
      ref_direccion: document.getElementById('ref_direccion').value,
      mz: document.getElementById('mz').value
    };

    try {
      // Enviando datos al doPost del Script
      await fetch(WEB_APP_URL, {
        method: 'POST',
        mode: 'no-cors', // Necesario para evitar bloqueos de seguridad desde GitHub
        cache: 'no-cache',
        body: JSON.stringify(data)
      });

      // Como usamos no-cors, el navegador no lee la respuesta de éxito, 
      // pero el envío se realiza. Limpiamos manualmente.
      document.getElementById('loader').style.display = 'none';
      document.getElementById('btnSubmit').disabled = false;
      M.toast({html: '🚀 Procesando datos en el Excel...'});
      document.getElementById('pacienteForm').reset();
      document.getElementById('rowNum').value = "";
      M.updateTextFields();
      
    } catch (error) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('btnSubmit').disabled = false;
      M.toast({html: '❌ Error en el envío'});
    }
  });
</script>
</body>
</html>
